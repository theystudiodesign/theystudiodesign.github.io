<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — THE’Y Client Portal</title>
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0F0F0E">
<link rel="preconnect" href="https://api.fontshare.com" crossorigin>
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@300,400,500,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/tokens.css">
<link rel="stylesheet" href="/assets/css/portal.css">
<script>(function(){try{var t=localStorage.getItem('they_theme');if(!t&&window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)t='light';if(t==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}})()</script>
</head>
<body>
<main class="auth-wrap">
  <section class="auth-brand">
    <span class="label">THE’Y Client Portal</span>
    <h1 class="stmt">Your projects, in one calm place.</h1>
  </section>
  <section class="auth-form" aria-label="Sign in">
    <span class="label">Sign in</span>
    <form id="magic-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required placeholder="you@company.com">
      </div>
      <button class="btn btn-primary" type="submit">Email me a magic link <span class="arrow">→</span></button>
    </form>
    <p class="mono" id="msg" style="margin-top:16px;line-height:1.7">Invite-only. We’ll email you a secure sign-in link — no password needed.<br>Trouble? <a class="link" href="mailto:hello@theystudiodesign.com">hello@theystudiodesign.com</a></p>
  </section>
</main>
<script type="module">
  import { loadSession, user, sendMagicLink } from "/assets/js/auth.js";
  await loadSession();
  if (user()) location.href = "/";
  const form = document.getElementById("magic-form");
  const msg = document.getElementById("msg");
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = form.querySelector("button"); btn.disabled = true;
    const email = document.getElementById("email").value;
    await sendMagicLink(email); // generic result — never reveal whether the email exists
    msg.textContent = "If that email is invited, a sign-in link is on its way. Check your inbox.";
    btn.disabled = false;
  });
</script>
</body>
</html>
