*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;background:#0F0F0E;color:#fff;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
body::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 55% at 50% 42%,rgba(255,255,255,.055),transparent 70%);
  pointer-events:none;
}
.wrap{text-align:center;padding:40px 24px;animation:fade 1.1s ease both;position:relative}
@keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.logo-txt{font-weight:300;font-size:54px;letter-spacing:12px;line-height:1;display:flex;align-items:flex-end;justify-content:center}
.logo-txt b{font-weight:800;font-size:78px;letter-spacing:0;margin-left:4px;line-height:.85}
.logo-sub{font-size:13px;letter-spacing:9px;color:#9A9A96;font-weight:500;margin-top:14px}
.sep{width:44px;height:1px;background:rgba(255,255,255,.22);margin:38px auto}
.coming{font-size:12px;letter-spacing:5px;color:#C4C4C0;text-transform:uppercase;font-weight:500}
.coming .dots::after{content:'';animation:dots 1.8s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}100%{content:''}}
.txt{color:#6F6F6C;font-size:13.5px;margin-top:16px;line-height:1.7;font-weight:400}
.wa{
  display:inline-flex;align-items:center;gap:10px;margin-top:36px;
  padding:13px 26px;border:1px solid rgba(255,255,255,.22);border-radius:999px;
  color:#fff;text-decoration:none;font-size:13.5px;font-weight:500;letter-spacing:.4px;
  transition:.22s;
}
.wa:hover{background:#fff;color:#0F0F0E;border-color:#fff}
.wa svg{width:17px;height:17px;fill:currentColor}
.foot{position:absolute;bottom:26px;left:0;right:0;text-align:center;font-size:10.5px;letter-spacing:1.5px;color:#4A4A47}
@media(max-width:560px){
  .logo-txt{font-size:38px;letter-spacing:8px}
  .logo-txt b{font-size:56px}
  .logo-sub{font-size:10.5px;letter-spacing:6.5px}
}
</style>
